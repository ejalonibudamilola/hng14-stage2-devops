version: "3.9"

services:
  redis:
    image: redis:7-alpine
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  api:
    build: ./api
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-net
    ports:
      - "8021:8000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  worker:
    build: ./worker
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  frontend:
    build: ./frontend
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-net
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

networks:
  app-net: