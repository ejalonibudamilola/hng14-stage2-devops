name: CI-CD Pipeline

on:
  push:
    branches: [main, develop]

jobs:

# ==================================================
# 1. LINT
# ==================================================
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 api worker tests

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint .

      - name: Run Hadolint
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile


# ==================================================
# 2. TEST
# ==================================================
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt pytest pytest-cov httpx

      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests --cov=api --cov-report=xml --cov-report=html

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/


# ==================================================
# 3. BUILD + SECURITY (GHCR FIXED)
# ==================================================
  build_and_security_scan:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # LOGIN TO GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # BUILD + PUSH API
      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
            ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # BUILD + PUSH WORKER
      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/worker:${{ github.sha }}
            ghcr.io/${{ github.repository }}/worker:latest

      # BUILD + PUSH FRONTEND
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest

      # TRIVY SCAN
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Run Trivy scan
        run: |
          trivy image --severity CRITICAL --exit-code 1 \
          --format sarif --output trivy.sarif \
          ghcr.io/${{ github.repository }}/api:${{ github.sha }}

      - name: Upload SARIF
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy.sarif


# ==================================================
# 4. INTEGRATION TEST
# ==================================================
  integration:
    runs-on: ubuntu-latest
    needs: build_and_security_scan

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Start stack
        env:
          REDIS_URL: redis://redis:6379/0
          API_URL: http://api:8000
        run: docker compose up -d --build

      - name: Wait for API
        run: |
          timeout 120 bash -c '
          until curl -sf http://localhost:8021/health; do
            sleep 3
          done
          '

      - name: Run integration tests
        run: bash tests/integration.sh

      - name: Cleanup
        if: always()
        run: docker compose down -v


# ==================================================
# 5. DEPLOY (ROLLING + GHCR)
# ==================================================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          docker pull ghcr.io/${{ github.repository }}/api:${{ github.sha }}

      - name: Run new container
        run: |
          docker run -d --name api_new -p 9000:8000 \
          -e REDIS_URL=redis://redis:6379/0 \
          ghcr.io/${{ github.repository }}/api:${{ github.sha }}

      - name: Health check
        run: |
          timeout 120 bash -c '
          until curl -sf http://localhost:9000/health; do
            sleep 3
          done
          '

      - name: Replace old container
        run: |
          docker stop api || true
          docker rm api || true
          docker rename api_new api