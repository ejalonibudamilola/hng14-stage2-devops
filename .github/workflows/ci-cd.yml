name: CI-CD Pipeline

on:
  push:
    branches: [main, develop]

jobs:

# ==================================================
# 1. LINT
# ==================================================
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 api worker tests

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint .

      - name: Run Hadolint on Dockerfiles
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile

# ==================================================
# 2. TEST
# ==================================================
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r api/requirements.txt pytest pytest-cov httpx

      - name: Run unit tests with coverage
        env:
          REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests --cov=api --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

# ==================================================
# 3. BUILD + SECURITY
# ==================================================
  build_and_security_scan:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Run Trivy scan and generate SARIF
        run: |
          trivy image --severity CRITICAL --exit-code 1 \
          --format sarif --output trivy-results.sarif \
          localhost:5000/api:${{ github.sha }}

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-report
          path: trivy-results.sarif

# ==================================================
# 4. INTEGRATION TEST
# ==================================================
  integration:
    runs-on: ubuntu-latest
    needs: build_and_security_scan

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Start application stack
        env:
          REDIS_URL: redis://redis:6379/0
          API_URL: http://api:8000
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          timeout 120 bash -c '
          until curl -sf http://localhost:8021/health; do
            sleep 5
          done
          '

      - name: Run integration script
        run: bash tests/integration.sh

      - name: Stop containers
        if: always()
        run: docker compose down -v

# ==================================================
# 5. DEPLOY
# ==================================================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t api:${{ github.sha }} ./api

      - name: Start current version
        run: docker compose up -d api || true

      - name: Launch new version
        run: |
          docker run -d --name api_new -p 9000:8000 \
          -e REDIS_URL=${{ secrets.REDIS_URL }} \
          api:${{ github.sha }}

      - name: Verify new version health
        run: |
          timeout 120 bash -c '
          until curl -sf http://localhost:9000/health; do
            sleep 5
          done
          '

      - name: Replace old version
        run: |
          docker stop api || true
          docker rm api || true
          docker rename api_new api