name: CI-CD Pipeline

on:
  push:
    branches: [main, develop]

jobs:

# ==================================================
# 1. LINT
# ==================================================
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 api worker tests

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Run eslint
        run: |
          cd frontend
          npx eslint .

      - name: Run hadolint
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile


# ==================================================
# 2. TEST
# ==================================================
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: pip install -r api/requirements.txt pytest pytest-cov httpx

      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests --cov=api --cov-report=xml --cov-report=html


# ==================================================
# 3. BUILD + SECURITY SCAN (FIXED)
# ==================================================
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      # Install Trivy
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      # Build images
      - name: Build Docker images
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} ./api
          docker build -t localhost:5000/worker:${{ github.sha }} ./worker
          docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend

      # Push images
      - name: Push images
        run: |
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/frontend:${{ github.sha }}

      # SECURITY SCAN (NOW SAME JOB = FIXED)
      - name: Trivy scan
        run: |
          trivy image --severity CRITICAL --exit-code 1 localhost:5000/api:${{ github.sha }}
          trivy image --severity CRITICAL --exit-code 1 localhost:5000/worker:${{ github.sha }}
          trivy image --severity CRITICAL --exit-code 1 localhost:5000/frontend:${{ github.sha }}


# ==================================================
# 4. INTEGRATION TEST
# ==================================================
  integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for startup
        run: sleep 20

      - name: Submit job
        run: curl -s -X POST http://localhost:8021/jobs

      - name: Health check
        run: |
          for i in {1..10}; do
            curl -f http://localhost:8021/health && exit 0
            sleep 5
          done
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v


# ==================================================
# 5. DEPLOY
# ==================================================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling deploy
        run: |
          docker compose up -d api

          docker run -d --name api_new -p 9000:8000 localhost:5000/api:${{ github.sha }}

          for i in {1..12}; do
            curl -f http://localhost:9000/health && break
            sleep 5
          done

          docker stop api || true
          docker rm api || true
          docker rename api_new api