name: CI-CD Pipeline

on:
  push:
    branches: [main, develop]

jobs:

# ==================================================
# 1. LINT
# ==================================================
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: python3 -m pip install flake8

      - name: Run flake8
        run: python3 -m flake8 api worker tests

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Run eslint
        run: |
          cd frontend
          npx eslint .

      - name: Run hadolint
        run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile


# ==================================================
# 2. TEST
# ==================================================
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: python3 -m pip install -r api/requirements.txt pytest pytest-cov

      - name: Run tests with coverage
        env:
          REDIS_URL: redis://redis:6379/0
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 -m pytest tests --cov=api --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/


# ==================================================
# 3. BUILD (LOCAL ONLY - FIXED)
# ==================================================
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t api:${{ github.sha }} ./api

      - name: Build Worker image
        run: docker build -t worker:${{ github.sha }} ./worker

      - name: Build Frontend image
        run: docker build -t frontend:${{ github.sha }} ./frontend


# ==================================================
# 4. SECURITY SCAN (FIXED TRIVY)
# ==================================================
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Scan API image
        run: |
          docker run --rm aquasec/trivy image \
          api:${{ github.sha }} \
          --severity CRITICAL --exit-code 1

      - name: Scan Worker image
        run: |
          docker run --rm aquasec/trivy image \
          worker:${{ github.sha }} \
          --severity CRITICAL --exit-code 1

      - name: Scan Frontend image
        run: |
          docker run --rm aquasec/trivy image \
          frontend:${{ github.sha }} \
          --severity CRITICAL --exit-code 1


# ==================================================
# 5. INTEGRATION TEST (REAL FLOW FIXED)
# ==================================================
  integration:
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for API
        run: sleep 20

      - name: Submit job and verify completion
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8021/jobs)
          JOB_ID=$(echo $RESPONSE | jq -r .job_id)

          echo "Job ID: $JOB_ID"

          for i in {1..12}
          do
            STATUS=$(curl -s http://localhost:8021/jobs/$JOB_ID | jq -r .status)

            if [ "$STATUS" = "completed" ]; then
              echo "Integration test passed"
              exit 0
            fi

            sleep 3
          done

          echo "Integration test failed"
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v


# ==================================================
# 6. DEPLOY (SAFE ROLLING UPDATE)
# ==================================================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy new API container
        run: |
          docker run -d --name api_new -p 9000:8000 api:${{ github.sha }}

          timeout=60

          until curl -f http://localhost:9000/health; do
            sleep 5
            timeout=$((timeout-5))

            if [ $timeout -le 0 ]; then
              echo "Deployment failed - rollback"
              docker stop api_new
              docker rm api_new
              exit 1
            fi
          done

          docker stop api || true
          docker rm api || true
          docker rename api_new api