name: CI-CD Pipeline

on:
  push:
    branches: [main, develop]

jobs:

# ==================================================
# 1. LINT
# ==================================================
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install flake8
      - run: flake8 api worker tests

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: |
          cd frontend
          npm install
          npx eslint .

      - run: |
          docker run --rm -i hadolint/hadolint < api/Dockerfile
          docker run --rm -i hadolint/hadolint < worker/Dockerfile
          docker run --rm -i hadolint/hadolint < frontend/Dockerfile


# ==================================================
# 2. TEST
# ==================================================
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r api/requirements.txt pytest pytest-cov httpx

      - name: Run tests
        env:
          REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests --cov=api --cov-report=xml --cov-report=html

      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.xml
            htmlcov/


# ==================================================
# 3. BUILD + SECURITY + REGISTRY FIX
# ==================================================
  build_and_security_scan:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: localhost:5000

      - uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: localhost:5000/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: localhost:5000/worker:${{ github.sha }}

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: localhost:5000/frontend:${{ github.sha }}

      - run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - run: |
          trivy image --severity CRITICAL --exit-code 1 \
          --format sarif --output trivy.sarif \
          localhost:5000/api:${{ github.sha }}

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy.sarif


# ==================================================
# 4. INTEGRATION TEST
# ==================================================
  integration:
    runs-on: ubuntu-latest
    needs: build_and_security_scan

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        env:
          REDIS_URL: redis://redis:6379/0
          API_URL: http://api:8000
        run: docker compose up -d --build

      - name: Wait API
        run: |
          timeout 120 bash -c '
          until curl -sf http://localhost:8021/health; do
            sleep 3
          done
          '

      - name: Run integration test
        run: bash tests/integration.sh

      - if: always()
        run: docker compose down -v


# ==================================================
# 5. DEPLOY (ROLLING FIX)
# ==================================================
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - run: docker build -t api:${{ github.sha }} ./api

      - run: docker run -d --name api_new -p 9000:8000 \
          -e REDIS_URL=redis://redis:6379/0 \
          api:${{ github.sha }}

      - run: |
          timeout 120 bash -c '
          until curl -sf http://localhost:9000/health; do
            sleep 5
          done
          '

      - run: |
          docker stop api || true
          docker rm api || true
          docker rename api_new api